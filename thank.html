<title>Mahadsanid</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4da6,#ff0066,#b30047);
color:white;
text-align:center;
overflow:hidden;
}

/* box */

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,0.3);
max-width:400px;
width:90%;
}

/* gif */

.gif{
width:220px;
margin-bottom:20px;
border-radius:15px;
}

/* text */

h1{
margin-bottom:10px;
}

p{
opacity:0.9;
}

/* button */

.btn{
margin-top:20px;
display:inline-block;
background:white;
color:#ff0066;
padding:10px 20px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
}

</style>
</head>
